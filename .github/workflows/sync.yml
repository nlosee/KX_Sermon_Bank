name: Weekly Sermon Sync

on:
  schedule:
    # Every Monday at 8:00 AM UTC (midnight Pacific, or 1am PDT)
    - cron: "0 8 * * 1"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit new notes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sermon sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sync.py

      - name: Commit new notes to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault/ data/processed.json data/no_captions.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: auto-sync new sermons [$(date -u '+%Y-%m-%d')]"
          git push
